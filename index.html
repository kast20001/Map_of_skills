<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>3D Куб навыков</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        touch-action: none;
        font-family: 'Segoe UI', sans-serif;
        background: #050b1a;
    }

    #info {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 12px 18px;
        border-radius: 10px;
        border-left: 4px solid #ffaa00;
        backdrop-filter: blur(5px);
        font-size: 14px;
    }

    .face-panel {
        cursor: pointer;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    .face-panel:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
    }
</style>
</head>

<body>

<div id="info">
    <strong>📊 3D Матрица навыков</strong><br>
    🖱️ ЛКМ — вращение<br>
    🔍 Колёсико — zoom<br>
    ✋ ПКМ — панорама
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@r128/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@r128/examples/jsm/"
    }
}
</script>

<script type="module">

import * as THREE from 'three';

import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

import {
    CSS2DRenderer,
    CSS2DObject
} from 'three/addons/renderers/CSS2DRenderer.js';


// --------------------------------------------------
// SCENE
// --------------------------------------------------

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x050b1a);

scene.fog = new THREE.FogExp2(0x050b1a, 0.01);


// --------------------------------------------------
// CAMERA
// --------------------------------------------------

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(4, 3, 5);


// --------------------------------------------------
// RENDERER
// --------------------------------------------------

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setPixelRatio(window.devicePixelRatio);

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);


// --------------------------------------------------
// LABEL RENDERER
// --------------------------------------------------

const labelRenderer = new CSS2DRenderer();

labelRenderer.setSize(
    window.innerWidth,
    window.innerHeight
);

labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';

document.body.appendChild(labelRenderer.domElement);


// --------------------------------------------------
// LIGHTS
// --------------------------------------------------

const ambientLight = new THREE.AmbientLight(
    0xffffff,
    0.6
);

scene.add(ambientLight);


const directionalLight = new THREE.DirectionalLight(
    0xffffff,
    1
);

directionalLight.position.set(5, 5, 5);

scene.add(directionalLight);


const blueLight = new THREE.PointLight(
    0x4488ff,
    0.6
);

blueLight.position.set(-5, 2, -5);

scene.add(blueLight);


// --------------------------------------------------
// STARS
// --------------------------------------------------

const starsGeometry = new THREE.BufferGeometry();

const starCount = 1200;

const positions = new Float32Array(starCount * 3);

for (let i = 0; i < starCount; i++) {

    positions[i * 3] = (Math.random() - 0.5) * 150;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 150;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 150;
}

starsGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(positions, 3)
);

const starsMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.08,
    transparent: true,
    opacity: 0.7
});

const stars = new THREE.Points(
    starsGeometry,
    starsMaterial
);

scene.add(stars);


// --------------------------------------------------
// CUBE
// --------------------------------------------------

const cubeGroup = new THREE.Group();

scene.add(cubeGroup);


const cubeGeometry = new THREE.BoxGeometry(
    3,
    3,
    3
);

const cubeMaterial = new THREE.MeshPhongMaterial({
    color: 0x2266aa,
    transparent: true,
    opacity: 0.08,
    side: THREE.DoubleSide
});

const cube = new THREE.Mesh(
    cubeGeometry,
    cubeMaterial
);

cubeGroup.add(cube);


// --------------------------------------------------
// WIREFRAME
// --------------------------------------------------

const edges = new THREE.EdgesGeometry(cubeGeometry);

const wireframe = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({
        color: 0x66ccff
    })
);

cubeGroup.add(wireframe);


// --------------------------------------------------
// PANEL CREATOR
// --------------------------------------------------

function createPanel(title, color) {

    const div = document.createElement('div');

    div.className = 'face-panel';

    div.style.width = '260px';
    div.style.height = '260px';

    div.style.background = 'rgba(15,20,40,0.92)';
    div.style.border = `2px solid ${color}`;
    div.style.borderRadius = '18px';

    div.style.backdropFilter = 'blur(8px)';
    div.style.boxShadow = '0 10px 25px rgba(0,0,0,0.45)';

    div.style.padding = '16px';
    div.style.color = 'white';

    div.innerHTML = `
        <h2 style="
            margin-top:0;
            color:${color};
            border-bottom:1px solid ${color};
            padding-bottom:8px;
        ">
            ${title}
        </h2>

        <p>• Java / Python</p>
        <p>• Docker / Kubernetes</p>
        <p>• AI Tools</p>
        <p>• PostgreSQL</p>
        <p>• CI/CD</p>
        <p>• System Design</p>
    `;

    return new CSS2DObject(div);
}


// --------------------------------------------------
// PANELS
// --------------------------------------------------

const front = createPanel(
    '🟢 Junior',
    '#88ff88'
);

front.position.set(0, 0, 1.7);

cubeGroup.add(front);


const back = createPanel(
    '🔵 Middle',
    '#88aaff'
);

back.position.set(0, 0, -1.7);

back.rotation.y = Math.PI;

cubeGroup.add(back);


const left = createPanel(
    '🔴 Senior',
    '#ff8888'
);

left.position.set(-1.7, 0, 0);

left.rotation.y = -Math.PI / 2;

cubeGroup.add(left);


const right = createPanel(
    '🛠️ Stack',
    '#ffaa66'
);

right.position.set(1.7, 0, 0);

right.rotation.y = Math.PI / 2;

cubeGroup.add(right);


const topPanel = createPanel(
    '🧠 Soft Skills',
    '#dd88ff'
);

topPanel.position.set(0, 1.7, 0);

topPanel.rotation.x = Math.PI / 2;

cubeGroup.add(topPanel);


const bottomPanel = createPanel(
    '📈 Metrics',
    '#66ffcc'
);

bottomPanel.position.set(0, -1.7, 0);

bottomPanel.rotation.x = -Math.PI / 2;

cubeGroup.add(bottomPanel);


// --------------------------------------------------
// PARTICLES RING
// --------------------------------------------------

const ringGeometry = new THREE.BufferGeometry();

const ringCount = 600;

const ringPositions = [];

for (let i = 0; i < ringCount; i++) {

    const theta = Math.random() * Math.PI * 2;

    const phi = Math.acos(2 * Math.random() - 1);

    const radius = 2.5;

    ringPositions.push(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.sin(phi) * Math.sin(theta),
        radius * Math.cos(phi)
    );
}

ringGeometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(
        ringPositions,
        3
    )
);

const ringMaterial = new THREE.PointsMaterial({
    color: 0x77aaff,
    size: 0.03,
    transparent: true,
    opacity: 0.5
});

const ringParticles = new THREE.Points(
    ringGeometry,
    ringMaterial
);

scene.add(ringParticles);


// --------------------------------------------------
// CONTROLS
// --------------------------------------------------

const controls = new OrbitControls(
    camera,
    renderer.domElement
);


// Плавность
controls.enableDamping = true;
controls.dampingFactor = 0.08;


// Вращение
controls.enableRotate = true;
controls.rotateSpeed = 0.9;


// Zoom
controls.enableZoom = true;
controls.zoomSpeed = 1.0;


// Ограничения zoom
controls.minDistance = 3;
controls.maxDistance = 12;


// Панорама
controls.enablePan = true;
controls.panSpeed = 0.8;


// Ограничения углов
controls.minPolarAngle = 0.2;
controls.maxPolarAngle = Math.PI - 0.2;


// Центр
controls.target.set(0, 0, 0);


// Touch support
controls.touches = {
    ONE: THREE.TOUCH.ROTATE,
    TWO: THREE.TOUCH.DOLLY_PAN
};


// --------------------------------------------------
// RESIZE
// --------------------------------------------------

window.addEventListener(
    'resize',
    onWindowResize
);

function onWindowResize() {

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    labelRenderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
}


// --------------------------------------------------
// ANIMATION
// --------------------------------------------------

let time = 0;

function animate() {

    requestAnimationFrame(animate);

    time += 0.005;

    ringParticles.rotation.y += 0.001;

    stars.rotation.y += 0.0002;

    cubeGroup.rotation.y += 0.0005;

    controls.update();

    renderer.render(scene, camera);

    labelRenderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
