<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Карта навыков Java/Python — интерактивный куб</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: #050b1a;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 20;
            backdrop-filter: blur(5px);
            font-size: 14px;
            border-left: 4px solid #ff8800;
            max-width: calc(100% - 40px);
            line-height: 1.4;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
            z-index: 20;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        .modal-content {
            background: linear-gradient(145deg, #0f172a, #0a0f1f);
            border-radius: 28px;
            max-width: 600px;
            width: 85%;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid #ffaa44;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            color: #f0f0f0;
            padding: 24px;
            position: relative;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-content h2 {
            margin-top: 0;
            border-bottom: 2px solid #ffaa44;
            display: inline-block;
            padding-bottom: 8px;
            font-size: 28px;
        }
        .modal-content .close-btn {
            position: absolute;
            top: 16px; right: 20px;
            background: none; border: none;
            color: #ffaa44;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            line-height: 1;
            padding: 0;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-content .close-btn:hover {
            transform: scale(1.2);
            color: #ff6644;
        }
        .modal-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .modal-item {
            background: #1e293b80;
            padding: 12px 16px;
            border-radius: 16px;
            border-left: 4px solid #ffaa44;
        }
        .modal-item strong {
            font-size: 18px;
            color: #ffdd99;
            display: block;
            margin-bottom: 6px;
        }
        .modal-item p {
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
            color: #cbd5e6;
        }
        .face-panel {
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .face-panel:active { cursor: grabbing; }
        .face-panel:hover {
            filter: brightness(1.05);
            box-shadow: 0 0 12px rgba(255,170,68,0.5);
            transform: scale(1.02);
        }
        .face-panel::-webkit-scrollbar { width: 6px; }
        .face-panel::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .face-panel::-webkit-scrollbar-thumb { background: #ffaa44; border-radius: 3px; }
        @media (max-width: 600px) {
            .modal-content { padding: 16px; width: 90%; }
            .modal-item strong { font-size: 16px; }
            #info { font-size: 12px; padding: 8px 12px; }
            #controls-note { font-size: 10px; bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>📊 3D Матрица навыков</strong> | Java • Python<br>
        <span style="color:#ffaa00;">👆 Кликните на грань — детали</span> | 🖱️ <em>Перетащите для вращения</em>
    </div>
    <div id="controls-note">
        🔄 ЛКМ — вращение | 🖱️ Колёсико — масштаб | 👆 Клик по панели — информация
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" id="closeModalBtn" aria-label="Закрыть">&times;</button>
            <h2 id="modalTitle">Название панели</h2>
            <div id="modalList" class="modal-list"></div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // === Инициализация ===
        init();

        function init() {
            // --- Сцена ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

            // --- Камера ---
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 4, 6);
            camera.lookAt(0, 0, 0);

            // --- WebGL Renderer ---
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            // 🔥 ВАЖНО: канвас должен быть ниже labelRenderer по z-index
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            renderer.domElement.style.left = '0';
            renderer.domElement.style.zIndex = '1';
            document.body.appendChild(renderer.domElement);

            // --- CSS2D Renderer для панелей ---
            const labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            // 🔥 ГЛАВНОЕ ИСПРАВЛЕНИЕ: события проходят сквозь контейнер к canvas
            labelRenderer.domElement.style.pointerEvents = 'none';
            labelRenderer.domElement.style.zIndex = '5';
            labelRenderer.domElement.style.userSelect = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // --- Освещение ---
            scene.add(new THREE.AmbientLight(0x404060, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(2, 5, 3);
            dirLight.castShadow = true;
            scene.add(dirLight);
            scene.add(new THREE.PointLight(0x4466cc, 0.5, 0, 2));
            scene.add(new THREE.PointLight(0xffaa66, 0.4, 0, 2));

            // --- Звёзды ---
            const starGeo = new THREE.BufferGeometry();
            const starsCount = 1200;
            const starsPos = new Float32Array(starsCount * 3);
            for (let i = 0; i < starsCount; i++) {
                starsPos[i*3] = (Math.random() - 0.5) * 200;
                starsPos[i*3+1] = (Math.random() - 0.5) * 100;
                starsPos[i*3+2] = (Math.random() - 0.5) * 80 - 40;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
            const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
                color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6, sizeAttenuation: true
            }));
            scene.add(stars);

            // --- Сетка пола ---
            const grid = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
            grid.position.y = -1.8;
            grid.material.transparent = true;
            grid.material.opacity = 0.25;
            scene.add(grid);

            // === Модальное окно ===
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const modalList = document.getElementById('modalList');
            const closeModalBtn = document.getElementById('closeModalBtn');

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function openModal(title, items) {
                modalTitle.textContent = title;
                modalList.innerHTML = '';
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'modal-item';
                    if (typeof item === 'string') {
                        div.innerHTML = `<strong>📄</strong><p>${escapeHtml(item)}</p>`;
                    } else {
                        div.innerHTML = `<strong>${escapeHtml(item.name)}</strong><p>${escapeHtml(item.desc || '')}</p>`;
                    }
                    modalList.appendChild(div);
                });
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.style.display = 'none';
                document.body.style.overflow = '';
            }

            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.style.display === 'flex') closeModal(); });

            // === Создание панели ===
            function createFacePanel(title, items, accentColor = '#ffaa44') {
                const div = document.createElement('div');
                div.className = 'face-panel';
                Object.assign(div.style, {
                    backgroundColor: 'rgba(20,25,45,0.92)',
                    backdropFilter: 'blur(8px)',
                    borderRadius: '16px',
                    border: `2px solid ${accentColor}`,
                    boxShadow: '0 8px 20px rgba(0,0,0,0.5)',
                    padding: '12px 10px',
                    width: '220px',
                    height: '220px',
                    color: '#f0f0f0',
                    fontSize: '12px',
                    overflowY: 'auto',
                    display: 'flex',
                    flexDirection: 'column',
                    transition: 'all 0.2s ease',
                    // 🔥 Панель должна принимать события (при том что контейнер — нет)
                    pointerEvents: 'auto',
                    touchAction: 'manipulation',
                    userSelect: 'none'
                });

                const header = document.createElement('div');
                Object.assign(header.style, {
                    fontSize: '18px', fontWeight: 'bold',
                    borderBottom: `2px solid ${accentColor}`,
                    marginBottom: '10px', paddingBottom: '6px',
                    display: 'flex', alignItems: 'center', gap: '8px', flexShrink: '0'
                });
                header.innerHTML = `<span style="font-size:22px;">📌</span> ${escapeHtml(title)}`;
                div.appendChild(header);

                // Превью
                items.slice(0, 4).forEach(item => {
                    const row = document.createElement('div');
                    Object.assign(row.style, { marginBottom: '8px', lineHeight: '1.3', flexShrink: '0' });
                    if (typeof item === 'string') {
                        const t = escapeHtml(item);
                        row.innerHTML = `<span style="color:${accentColor};font-weight:500;">•</span> ${t.length > 50 ? t.slice(0,50)+'…' : t}`;
                    } else {
                        const name = escapeHtml(item.name);
                        const desc = escapeHtml(item.desc || '');
                        row.innerHTML = `<span style="color:${accentColor};font-weight:600;">${name}</span><br><span style="font-size:10px;color:#bbbbee;">${desc.length > 45 ? desc.slice(0,45)+'…' : desc}</span>`;
                    }
                    div.appendChild(row);
                });

                const hint = document.createElement('div');
                Object.assign(hint.style, {
                    marginTop: 'auto', fontSize: '10px', color: '#ffaa66',
                    textAlign: 'center', paddingTop: '5px', flexShrink: '0'
                });
                hint.innerHTML = '▼ кликните для полного списка ▼';
                div.appendChild(hint);

                // Обработчики кликов
                const handleClick = (e) => { e.stopPropagation(); e.preventDefault(); openModal(title, items); };
                div.addEventListener('click', handleClick, { passive: false });
                div.addEventListener('touchend', handleClick, { passive: true });

                return new CSS2DObject(div);
            }

            // === Данные ===
            const juniorItems = [
                { name: "🔹 Java Core / Python синтаксис", desc: "Multithreading, Collections / Asyncio, строгая типизация. Базовые алгоритмы." },
                { name: "🔹 Git, CI/CD основы", desc: "GitHub Actions / GitLab CI, работа в команде через pull requests." },
                { name: "🔹 Базы данных (SQL, PostgreSQL)", desc: "Написание сложных JOIN, индексы, транзакции." },
                { name: "🔹 ИИ-инструменты", desc: "GitHub Copilot, ChatGPT, промпт-инжиниринг (критически важно для джуна в 2026)." },
                { name: "🔹 ATS-оптимизация резюме", desc: "Ключевые слова: Spring, Django, Docker, SQL, чтобы пройти фильтры." },
                { name: "🔹 Английский (Tech)", desc: "Чтение документации, базовое общение в чатах." }
            ];
            const middleItems = [
                { name: "⚙️ Архитектура и паттерны", desc: "Микросервисы, REST, gRPC, SOLID, CQRS, Event Sourcing." },
                { name: "⚙️ Продвинутый ИИ", desc: "Fine-tuning LLM, RAG-приложения, интеграция AI API." },
                { name: "⚙️ Контейнеризация", desc: "Docker, Docker Compose, Kubernetes (основы)." },
                { name: "⚙️ Импортозамещение", desc: "Работа с Astra Linux, Postgres Pro, Ред ОС, Alt Linux." },
                { name: "⚙️ Работа по ГПХ / ИП", desc: "Оформление самозанятости, налоги, договоры — рост 12% ИП в IT." },
                { name: "⚙️ Тестирование", desc: "JUnit / pytest, интеграционное и модульное тестирование, TDD." }
            ];
            const seniorItems = [
                { name: "🏆 Системный дизайн", desc: "HighLoad, отказоустойчивость, балансировка, кеширование (Redis)." },
                { name: "🏆 Управление командой", desc: "Code review, менторство, OKR, найм, онбординг." },
                { name: "🏆 Безопасность", desc: "OWASP Top 10, статический анализ кода, уязвимости." },
                { name: "🏆 Стратегия ИИ", desc: "Внедрение AI в цикл разработки, оценка рисков." },
                { name: "🏆 Бюджетирование", desc: "Оценка стоимости проектов, TCO, управление ресурсами." },
                { name: "🏆 Переговоры с заказчиком", desc: "Технический sales, презентация решений, защита архитектуры." }
            ];
            const toolsItems = [
                { name: "🛠️ Java-стек", desc: "Spring Boot, Hibernate, Maven/Gradle, Micronaut." },
                { name: "🛠️ Python-стек", desc: "FastAPI/Django, Pandas, Celery, SQLAlchemy." },
                { name: "🛠️ DevOps культура", desc: "Terraform, GitHub Actions, Ansible, мониторинг." },
                { name: "🛠️ Базы данных", desc: "PostgreSQL, Redis, MongoDB, ClickHouse." },
                { name: "🛠️ Message brokers", desc: "Kafka, RabbitMQ, NATS." },
                { name: "🛠️ Мониторинг", desc: "Prometheus + Grafana, ELK стек." }
            ];
            const softTrends = [
                { name: "🧠 Коммуникация", desc: "Работа в распределённых командах, синхронизация с product owner." },
                { name: "🧠 Адаптивность", desc: "Смена стека, импортозамещение, быстрое обучение." },
                { name: "🧠 Временной менеджмент", desc: "Agile/Scrum, Jira, тайм-менеджмент при удалёнке." },
                { name: "📈 Тренд 2026", desc: "ИИ не заменит Senior, но автоматизирует 70% рутины джунов." },
                { name: "📈 Серый рынок + ИП", desc: "Рост числа ИП в IT на 12% за год, переход на ГПХ." },
                { name: "📈 Кризис Junior", desc: "HH-индекс >12 (до 23 резюме на вакансию), выживают только с доп. навыками." }
            ];
            const metricsItems = [
                { name: "📊 HH-индекс (Java/Python)", desc: "Апрель 2026: 23 резюме на 1 вакансию (Junior), Middle — 7, Senior — 3." },
                { name: "💰 Медианная з/п Middle", desc: "220-270 тыс. ₽ (стагнация с 2025, без роста)." },
                { name: "🎯 Рекомендация", desc: "Джунам → Middle за 1-2 года, усилить ИИ, ATS-оптимизацию." },
                { name: "🏁 Дефицит", desc: "Только Senior+ и Lead (их не хватает даже при кризисе)." },
                { name: "⚠️ ATS фильтры", desc: "80% резюме отсекаются ботами, нужно адаптировать под каждую вакансию." },
                { name: "✅ Карта навыков", desc: "Обновлять каждые 3 месяца, динамика требований растёт." }
            ];

            // === Панели ===
            const panels = [
                createFacePanel("🟢 Junior (2026)", juniorItems, "#88ff88"),
                createFacePanel("🔵 Middle", middleItems, "#88aaff"),
                createFacePanel("🔴 Senior / Lead", seniorItems, "#ff8888"),
                createFacePanel("🛠️ Инструменты", toolsItems, "#ffaa66"),
                createFacePanel("🧩 Soft Skills", softTrends, "#dd88ff"),
                createFacePanel("📈 Метрики", metricsItems, "#66ffcc")
            ];

            const cubeGroup = new THREE.Group();
            scene.add(cubeGroup);

            const r = 1.55;
            // Позиции: +Z, -Z, -X, +X, +Y, -Y
            panels[0].position.set(0, 0, r);
            panels[1].position.set(0, 0, -r);
            panels[2].position.set(-r, 0, 0);
            panels[3].position.set(r, 0, 0);
            panels[4].position.set(0, r, 0);
            panels[5].position.set(0, -r, 0);
            // Повороты для правильной ориентации текста
            panels[1].rotation.y = Math.PI;
            panels[2].rotation.y = -Math.PI / 2;
            panels[3].rotation.y = Math.PI / 2;
            panels[4].rotation.x = Math.PI / 2;
            panels[5].rotation.x = -Math.PI / 2;

            panels.forEach(p => cubeGroup.add(p));

            // Декоративный куб
            const boxGeo = new THREE.BoxGeometry(2.9, 2.9, 2.9);
            cubeGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), new THREE.LineBasicMaterial({ color: 0x66ccff })));
            cubeGroup.add(new THREE.Mesh(boxGeo, new THREE.MeshPhongMaterial({ color: 0x2266aa, transparent: true, opacity: 0.07, side: THREE.DoubleSide })));

            // Частицы
            const ringGeo = new THREE.BufferGeometry();
            const ringPos = [];
            for (let i = 0; i < 800; i++) {
                const θ = Math.random() * Math.PI * 2;
                const φ = Math.acos(2 * Math.random() - 1);
                const rad = 2.2;
                ringPos.push(rad * Math.sin(φ) * Math.cos(θ), rad * Math.sin(φ) * Math.sin(θ), rad * Math.cos(φ));
            }
            ringGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringPos), 3));
            const ringParticles = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0x77aaff, size: 0.04, transparent: true, opacity: 0.5, sizeAttenuation: true }));
            scene.add(ringParticles);

            // === OrbitControls ===
            const controls = new OrbitControls(camera, renderer.domElement); // 🔥 Привязан к canvas, не к labelRenderer!
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 0.7;
            controls.zoomSpeed = 1.0;
            controls.minDistance = 3.5;
            controls.maxDistance = 12;
            controls.enablePan = true;
            controls.panSpeed = 0.8;
            controls.minPolarAngle = 0.2;
            controls.maxPolarAngle = Math.PI - 0.2;
            controls.target.set(0, 0, 0);
            // 🔥 Исправленные настройки тача (строки, не константы)
            controls.touches = { ONE: 'ROTATE', TWO: 'DOLLY_PAN' };
            controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

            // === Resize ===
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            });

            // === Анимация ===
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.008;
                ringParticles.rotation.y = time * 0.2;
                ringParticles.rotation.x = Math.sin(time * 0.3) * 0.2;
                stars.rotation.y += 0.0005;
                controls.update();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
